<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>IP Threat Intelligence</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #050a0f;
      --panel: #090f18;
      --border: #0d2033;
      --accent: #00d4ff;
      --accent2: #00ff9d;
      --warn: #ffb800;
      --danger: #ff3b5c;
      --text: #c8dbe8;
      --dim: #3a5a70;
      --font-mono: 'Share Tech Mono', monospace;
      --font-ui: 'Rajdhani', sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-ui);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Scanline overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0, 212, 255, 0.015) 2px,
        rgba(0, 212, 255, 0.015) 4px
      );
      pointer-events: none;
      z-index: 9999;
    }

    /* Grid background */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,212,255,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,212,255,0.04) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      max-width: 1100px;
      margin: 0 auto;
      padding: 24px 16px 60px;
    }

    /* HEADER */
    header {
      text-align: center;
      padding: 32px 0 28px;
    }

    .logo-line {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      margin-bottom: 8px;
    }

    .logo-icon {
      width: 44px;
      height: 44px;
      border: 2px solid var(--accent);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      box-shadow: 0 0 20px rgba(0,212,255,0.3);
      animation: pulse 3s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 20px rgba(0,212,255,0.3); }
      50% { box-shadow: 0 0 40px rgba(0,212,255,0.6); }
    }

    header h1 {
      font-family: var(--font-ui);
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: #fff;
    }

    header h1 span { color: var(--accent); }

    .subtitle {
      font-family: var(--font-mono);
      font-size: 0.7rem;
      color: var(--dim);
      letter-spacing: 3px;
      margin-top: 6px;
    }

    /* SEARCH BAR */
    .search-section {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 20px;
      position: relative;
    }

    .search-section::before {
      content: 'TARGET INPUT';
      position: absolute;
      top: -10px;
      left: 20px;
      background: var(--panel);
      padding: 0 8px;
      font-family: var(--font-mono);
      font-size: 0.65rem;
      color: var(--accent);
      letter-spacing: 2px;
    }

    .search-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .ip-input {
      flex: 1;
      min-width: 200px;
      background: rgba(0,212,255,0.03);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 16px;
      font-family: var(--font-mono);
      font-size: 1rem;
      color: var(--accent);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .ip-input::placeholder { color: var(--dim); }

    .ip-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(0,212,255,0.1);
    }

    .btn {
      padding: 12px 24px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      font-family: var(--font-ui);
      font-weight: 700;
      font-size: 0.9rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      transition: all 0.2s;
    }

    .btn-primary {
      background: var(--accent);
      color: #000;
    }

    .btn-primary:hover {
      background: #fff;
      box-shadow: 0 0 20px rgba(0,212,255,0.5);
    }

    .btn-secondary {
      background: transparent;
      color: var(--accent);
      border: 1px solid var(--border);
    }

    .btn-secondary:hover {
      border-color: var(--accent);
      background: rgba(0,212,255,0.06);
    }

    .btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* STATUS BAR */
    .status-bar {
      font-family: var(--font-mono);
      font-size: 0.72rem;
      color: var(--dim);
      margin-top: 10px;
      min-height: 18px;
    }

    .status-bar.loading { color: var(--warn); }
    .status-bar.error { color: var(--danger); }
    .status-bar.success { color: var(--accent2); }

    /* RESULTS GRID */
    .results-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 16px;
    }

    @media (max-width: 680px) {
      .results-grid { grid-template-columns: 1fr; }
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      position: relative;
    }

    .panel-label {
      position: absolute;
      top: -10px;
      left: 16px;
      background: var(--panel);
      padding: 0 8px;
      font-family: var(--font-mono);
      font-size: 0.62rem;
      color: var(--accent);
      letter-spacing: 2px;
    }

    /* RISK BADGE */
    .risk-badge {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 16px;
    }

    .risk-circle {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      border: 3px solid currentColor;
      flex-shrink: 0;
      position: relative;
    }

    .risk-circle::after {
      content: '';
      position: absolute;
      inset: -8px;
      border-radius: 50%;
      border: 1px solid currentColor;
      opacity: 0.2;
    }

    .risk-score {
      font-family: var(--font-mono);
      font-size: 1.5rem;
      font-weight: bold;
      line-height: 1;
    }

    .risk-label {
      font-size: 0.55rem;
      letter-spacing: 1px;
      opacity: 0.8;
    }

    .risk-LOW { color: var(--accent2); }
    .risk-MEDIUM { color: var(--warn); }
    .risk-HIGH { color: var(--danger); }

    .risk-info h3 {
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: 1px;
      margin-bottom: 4px;
    }

    .risk-info p {
      font-family: var(--font-mono);
      font-size: 0.7rem;
      color: var(--dim);
      line-height: 1.5;
    }

    /* THREAT BAR */
    .threat-bar-wrap {
      margin: 14px 0 0;
    }

    .threat-bar-label {
      display: flex;
      justify-content: space-between;
      font-family: var(--font-mono);
      font-size: 0.65rem;
      color: var(--dim);
      margin-bottom: 6px;
    }

    .threat-bar {
      height: 6px;
      background: rgba(255,255,255,0.05);
      border-radius: 3px;
      overflow: hidden;
    }

    .threat-fill {
      height: 100%;
      border-radius: 3px;
      transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1);
      width: 0%;
    }

    /* FLAGS */
    .flag-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 12px;
    }

    .flag-chip {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 4px 10px;
      border-radius: 20px;
      font-family: var(--font-mono);
      font-size: 0.65rem;
      letter-spacing: 1px;
      border: 1px solid;
    }

    .flag-chip.on {
      background: rgba(255,59,92,0.1);
      border-color: rgba(255,59,92,0.4);
      color: var(--danger);
    }

    .flag-chip.off {
      background: rgba(0,255,157,0.05);
      border-color: rgba(0,255,157,0.2);
      color: var(--dim);
    }

    .flag-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: currentColor;
    }

    /* GEO INFO */
    .info-row {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 8px 0;
      border-bottom: 1px solid var(--border);
    }

    .info-row:last-child { border-bottom: none; }

    .info-key {
      font-family: var(--font-mono);
      font-size: 0.65rem;
      color: var(--dim);
      letter-spacing: 1px;
      width: 100px;
      flex-shrink: 0;
      padding-top: 2px;
    }

    .info-val {
      font-family: var(--font-mono);
      font-size: 0.8rem;
      color: var(--accent);
      word-break: break-all;
    }

    /* MAP */
    .map-panel {
      grid-column: 1 / -1;
    }

    #map {
      height: 280px;
      border-radius: 8px;
      background: #0a1520;
      filter: hue-rotate(180deg) invert(0.85) saturate(0.5);
    }

    /* JSON VIEWER */
    .json-panel { grid-column: 1 / -1; }

    .json-toggle {
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
      margin-bottom: 12px;
    }

    .json-toggle h3 {
      font-family: var(--font-mono);
      font-size: 0.75rem;
      color: var(--dim);
      letter-spacing: 2px;
    }

    .json-toggle span {
      font-family: var(--font-mono);
      font-size: 0.65rem;
      color: var(--accent);
      border: 1px solid var(--border);
      padding: 2px 10px;
      border-radius: 4px;
      cursor: pointer;
    }

    .json-toggle span:hover { border-color: var(--accent); }

    #json-output {
      background: rgba(0,0,0,0.4);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px;
      font-family: var(--font-mono);
      font-size: 0.72rem;
      line-height: 1.7;
      color: var(--text);
      max-height: 340px;
      overflow-y: auto;
      white-space: pre-wrap;
      display: none;
    }

    #json-output .key { color: var(--accent); }
    #json-output .str { color: var(--accent2); }
    #json-output .num { color: var(--warn); }
    #json-output .bool { color: var(--danger); }
    #json-output .null { color: var(--dim); }

    /* PLACEHOLDER */
    .placeholder {
      text-align: center;
      padding: 60px 20px;
      color: var(--dim);
    }

    .placeholder .big-icon { font-size: 3rem; margin-bottom: 16px; opacity: 0.3; }
    .placeholder p { font-family: var(--font-mono); font-size: 0.75rem; letter-spacing: 2px; }

    .hidden { display: none !important; }

    /* LOADER */
    @keyframes spin { to { transform: rotate(360deg); } }

    .loader {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid var(--border);
      border-top-color: var(--warn);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }

    /* COPY BTN */
    .copy-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--dim);
      padding: 4px 12px;
      border-radius: 4px;
      font-family: var(--font-mono);
      font-size: 0.65rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    .copy-btn:hover { border-color: var(--accent); color: var(--accent); }
  </style>
</head>
<body>
<div class="container">

  <header>
    <div class="logo-line">
      <div class="logo-icon">🛡</div>
      <h1>IP <span>THREAT</span> INTEL</h1>
    </div>
    <div class="subtitle">// NETWORK RECONNAISSANCE & THREAT ANALYSIS SYSTEM //</div>
  </header>

  <!-- Search -->
  <div class="search-section">
    <div class="search-row">
      <input class="ip-input" id="ip-input" type="text" placeholder="Enter IP address (e.g. 8.8.8.8)" maxlength="45" autocomplete="off"/>
      <button class="btn btn-primary" id="lookup-btn" onclick="lookupIP()">ANALYZE</button>
      <button class="btn btn-secondary" id="myip-btn" onclick="lookupMyIP()">MY IP</button>
    </div>
    <div class="status-bar" id="status-bar">Ready. Enter an IP address to begin analysis.</div>
  </div>

  <!-- Placeholder -->
  <div id="placeholder">
    <div class="panel placeholder">
      <div class="big-icon">🔍</div>
      <p>AWAITING TARGET INPUT</p>
    </div>
  </div>

  <!-- Results -->
  <div id="results" class="hidden">

    <div class="results-grid">

      <!-- Risk Panel -->
      <div class="panel">
        <span class="panel-label">THREAT ASSESSMENT</span>
        <div class="risk-badge">
          <div class="risk-circle" id="risk-circle">
            <span class="risk-score" id="risk-score">0</span>
            <span class="risk-label">SCORE</span>
          </div>
          <div class="risk-info">
            <h3 id="risk-level-text">—</h3>
            <p id="risk-desc">—</p>
          </div>
        </div>
        <div class="threat-bar-wrap">
          <div class="threat-bar-label">
            <span>THREAT LEVEL</span>
            <span id="threat-pct">0%</span>
          </div>
          <div class="threat-bar">
            <div class="threat-fill" id="threat-fill"></div>
          </div>
        </div>
        <div class="flag-row" id="flag-row"></div>
      </div>

      <!-- Geo Panel -->
      <div class="panel">
        <span class="panel-label">GEOLOCATION DATA</span>
        <div id="geo-info"></div>
      </div>

      <!-- Map Panel -->
      <div class="panel map-panel">
        <span class="panel-label">MAP LOCATION</span>
        <div id="map"></div>
      </div>

      <!-- JSON Panel -->
      <div class="panel json-panel">
        <div class="json-toggle" onclick="toggleJson()">
          <h3>RAW JSON RESPONSE</h3>
          <div style="display:flex;gap:8px">
            <button class="copy-btn" onclick="copyJson(event)">COPY</button>
            <span id="json-toggle-btn">▶ EXPAND</span>
          </div>
        </div>
        <pre id="json-output"></pre>
      </div>

    </div>
  </div>

</div>

<script>
let leafletMap = null;
let marker = null;
let jsonExpanded = false;
let lastData = null;

const $ = id => document.getElementById(id);

function setStatus(msg, type = '') {
  const el = $('status-bar');
  el.className = 'status-bar ' + type;
  el.innerHTML = msg;
}

async function lookupMyIP() {
  try {
    const r = await fetch('/api/myip');
    const d = await r.json();
    $('ip-input').value = d.ip;
    lookupIP();
  } catch {
    setStatus('Failed to detect your IP.', 'error');
  }
}

async function lookupIP() {
  const ip = $('ip-input').value.trim();
  if (!ip) return setStatus('Please enter an IP address.', 'error');

  $('lookup-btn').disabled = true;
  $('myip-btn').disabled = true;
  setStatus('<span class="loader"></span>SCANNING TARGET: ' + ip, 'loading');

  try {
    const r = await fetch('/api/lookup/' + encodeURIComponent(ip));
    const data = await r.json();

    if (!r.ok || data.error) {
      setStatus('ERROR: ' + (data.error || 'Unknown error'), 'error');
      return;
    }

    lastData = data;
    renderResults(data);
    setStatus('✓ ANALYSIS COMPLETE — ' + data.query + ' resolved in ' + Date.now() % 1000 + 'ms', 'success');

  } catch (err) {
    setStatus('ERROR: Network failure — ' + err.message, 'error');
  } finally {
    $('lookup-btn').disabled = false;
    $('myip-btn').disabled = false;
  }
}

function renderResults(d) {
  $('placeholder').classList.add('hidden');
  $('results').classList.remove('hidden');

  // Risk
  const score = d.threatScore || 0;
  const level = d.riskLevel || 'LOW';
  const circle = $('risk-circle');
  circle.className = 'risk-circle risk-' + level;
  $('risk-score').textContent = score;
  $('risk-level-text').textContent = level + ' RISK';

  const descs = {
    LOW: 'No significant threat indicators detected. IP appears to be a standard residential or business connection.',
    MEDIUM: 'Some threat indicators present. This IP may be using a VPN, proxy, or hosting service.',
    HIGH: 'Multiple threat indicators detected. Exercise caution — possible proxy, VPN, or malicious source.'
  };
  $('risk-desc').textContent = descs[level];

  const fill = $('threat-fill');
  const colors = { LOW: '#00ff9d', MEDIUM: '#ffb800', HIGH: '#ff3b5c' };
  fill.style.background = colors[level];
  setTimeout(() => { fill.style.width = score + '%'; }, 100);
  $('threat-pct').textContent = score + '%';

  // Flags
  const flags = [
    { key: 'proxy', label: 'PROXY' },
    { key: 'hosting', label: 'HOSTING' },
    { key: 'mobile', label: 'MOBILE' }
  ];
  $('flag-row').innerHTML = flags.map(f =>
    `<div class="flag-chip ${d[f.key] ? 'on' : 'off'}">
      <div class="flag-dot"></div>${f.label}: ${d[f.key] ? 'YES' : 'NO'}
    </div>`
  ).join('');

  // Geo Info
  const geo = [
    ['IP', d.query],
    ['COUNTRY', (d.countryCode ? `${d.countryCode} — ` : '') + (d.country || '—')],
    ['REGION', d.regionName || '—'],
    ['CITY', d.city || '—'],
    ['ZIP', d.zip || '—'],
    ['TIMEZONE', d.timezone || '—'],
    ['ISP', d.isp || '—'],
    ['ORG', d.org || '—'],
    ['AS', d.as || '—'],
    ['HOSTNAME', d.reverse || '—'],
    ['COORDS', d.lat && d.lon ? `${d.lat}, ${d.lon}` : '—']
  ];
  $('geo-info').innerHTML = geo.map(([k, v]) =>
    `<div class="info-row"><span class="info-key">${k}</span><span class="info-val">${v}</span></div>`
  ).join('');

  // Map
  renderMap(d.lat, d.lon, d.city || d.country || d.query);

  // JSON
  renderJSON(d);
}

function renderMap(lat, lon, label) {
  if (!lat || !lon) return;

  if (leafletMap) {
    leafletMap.remove();
    leafletMap = null;
  }

  leafletMap = L.map('map').setView([lat, lon], 10);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap'
  }).addTo(leafletMap);

  const icon = L.divIcon({
    className: '',
    html: '<div style="width:14px;height:14px;background:#00d4ff;border-radius:50%;border:2px solid #fff;box-shadow:0 0 12px #00d4ff"></div>',
    iconSize: [14, 14],
    iconAnchor: [7, 7]
  });

  L.marker([lat, lon], { icon })
    .addTo(leafletMap)
    .bindPopup(`<b>${label}</b><br/>${lat.toFixed(4)}, ${lon.toFixed(4)}`)
    .openPopup();
}

function renderJSON(data) {
  const html = syntaxHighlight(JSON.stringify(data, null, 2));
  $('json-output').innerHTML = html;
}

function syntaxHighlight(json) {
  return json.replace(/("(\\u[a-zA-Z0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(?:\.\d*)?(?:[eE][+\-]?\d+)?)/g, match => {
    let cls = 'num';
    if (/^"/.test(match)) cls = /:$/.test(match) ? 'key' : 'str';
    else if (/true|false/.test(match)) cls = 'bool';
    else if (/null/.test(match)) cls = 'null';
    return `<span class="${cls}">${match}</span>`;
  });
}

function toggleJson() {
  jsonExpanded = !jsonExpanded;
  $('json-output').style.display = jsonExpanded ? 'block' : 'none';
  $('json-toggle-btn').textContent = jsonExpanded ? '▼ COLLAPSE' : '▶ EXPAND';
}

function copyJson(e) {
  e.stopPropagation();
  if (!lastData) return;
  navigator.clipboard.writeText(JSON.stringify(lastData, null, 2))
    .then(() => { e.target.textContent = 'COPIED!'; setTimeout(() => e.target.textContent = 'COPY', 1500); });
}

// Enter key support
$('ip-input').addEventListener('keydown', e => { if (e.key === 'Enter') lookupIP(); });
</script>
</body>
</html>
